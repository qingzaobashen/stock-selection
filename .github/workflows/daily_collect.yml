name: Daily Data Collection

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30 (工作日)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      tasks:
        description: '采集任务 (逗号分隔: industries,stocks,quotes)'
        required: false
        default: 'industries,stocks,quotes'
      date:
        description: '行情日期 (YYYY-MM-DD，默认当天)'
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'collector/requirements.txt'

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run data collection
        run: |
          python collector/main.py \
            --tasks ${{ github.event.inputs.tasks || 'industries,stocks,quotes' }} \
            ${{ github.event.inputs.date && format('--date {0}', github.event.inputs.date) || '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
